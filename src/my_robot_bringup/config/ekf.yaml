    frequency: 30.0
    two_d_mode: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint # changed to base_footprint as per REALNAV4.5
    world_frame: odom

    imu0: /imu/mpu6050
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true, false, false]
    imu0_differential: false

    # update odom0 to realnav's diff drive controller
    odom0: /my_robot_base_controller/odom
    odom0_config: [false, false, false,
                   false, false, true,
                   true, true, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    publish_tf: true
