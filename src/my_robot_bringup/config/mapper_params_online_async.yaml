slam_toolbox:
  ros__parameters:

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    qos_overrides:
      /scan:
        subscription:
          reliability: best_effort
    use_map_saver: true
    mode: mapping  # Otonom keşif için mapping modu

    # OTONOM KEŞİF İÇİN: Eski haritayı yükleme, sıfırdan başla
    # Eğer eski haritadan devam etmek isterseniz, aşağıdaki satırları açın:
    # map_file_name: /path/to/map
    # map_start_at_dock: true
    # map_start_pose: [0.0, 0.0, 0.0]

    debug_logging: false
    throttle_scans: 5             # Raspi CPU'yu rahatlat (3 -> 5)
    transform_publish_period: 0.02
    map_update_interval: 5.0      # Raspi CPU'yu rahatlat (3.0 -> 5.0)
    resolution: 0.05
    min_laser_range: 0.0
    max_laser_range: 8.0          # Maksimum menzili küçülterek hesaplamayı ve gürültüyü azalt (12.0 -> 8.0)
    minimum_time_interval: 0.5
    transform_timeout: 2.0
    tf_buffer_duration: 120.0
    stack_size_to_use: 40000000 #// program needs a larger stack size to serialize large maps
    enable_interactive_mode: true

    # General Parameters
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.3
    minimum_travel_heading: 0.3
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1  
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true 
    loop_match_minimum_chain_size: 10           
    loop_match_maximum_variance_coarse: 3.0  
    loop_match_minimum_response_coarse: 0.35    
    loop_match_minimum_response_fine: 0.45

    # Correlation Parameters - Correlation Parameters
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1 

    # Correlation Parameters - Loop Closure Parameters
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher Parameters (Odom Gürültüsüne Karşı Tolerans)
    distance_variance_penalty: 0.3     # Azaltıldı: odom'dan sapmaya daha az ceza ver (LiDAR'a güven)
    angle_variance_penalty: 0.5        # Azaltıldı: odom açısından sapmaya daha az ceza
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.6         # Dönüşlerde LiDAR scan eşleşmesine daha çok izin ver
    minimum_distance_penalty: 0.4      # Doğrusal gidişlerde LiDAR scan eşleşmesine daha çok izin ver
    use_response_expansion: true
    min_pass_through: 2
    occupancy_threshold: 0.65
